<body>

<div class="contenedor">

  <h2>Calificaciones de Clientes</h2>

  <div class="formulario">
    <input type="text" id="nombre" placeholder="Tu nombre">
    
    <select id="rating">
      <option value="5">⭐⭐⭐⭐⭐</option>
      <option value="4">⭐⭐⭐⭐</option>
      <option value="3">⭐⭐⭐</option>
      <option value="2">⭐⭐</option>
      <option value="1">⭐</option>
    </select>

    <textarea id="comentario" placeholder="Escribe tu comentario"></textarea>
    <button onclick="agregarComentario()">Enviar</button>
  </div>

  <div id="listaComentarios"></div>

</div>
<script>

let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [
  
];

function mostrarComentarios() {
  let contenedor = document.getElementById("listaComentarios");
  contenedor.innerHTML = "";

  comentarios.forEach(c => {
    contenedor.innerHTML += `
      <div class="comentario">
        <div class="nombre">${c.nombre}</div>
        <div class="estrellas">${"⭐".repeat(c.rating)}</div>
        <div>${c.texto}</div>
      </div>
    `;
  });
}

function agregarComentario() {
  let nombre = document.getElementById("nombre").value;
  let texto = document.getElementById("comentario").value;
  let rating = document.getElementById("rating").value;

  if(nombre === "" || texto === "") {
    alert("Complete todos los campos");
    return;
  }

  comentarios.push({
    nombre: nombre,
    texto: texto,
    rating: parseInt(rating)
  });

  localStorage.setItem("comentarios", JSON.stringify(comentarios));
  document.getElementById("nombre").value = "";
  document.getElementById("comentario").value = "";

  mostrarComentarios();
}
mostrarComentarios();

</script>
